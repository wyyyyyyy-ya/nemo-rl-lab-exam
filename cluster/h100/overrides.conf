# 硬件 profile: 单机 1× H100 (80GB)
# NeMo-RL CLI 覆盖项，每行一个 key=value，被实验 run.sh 读取并追加到训练命令。
# 详见官方：examples/run_grpo.py --config <yaml> key=value ...

# Ray：单节点、单卡。⚠️ 经中心化服务提交时，节点数/卡数由服务端 profile 注册表权威下发
# 并覆盖此处（与配额计量严格一致）；这两行仅在「本地直跑」时生效。
cluster.num_nodes=1
cluster.gpus_per_node=1

# 单卡：所有并行度都为 1（无 TP/PP/CP 可切分，DP 也只有 1）。
# 两个后端的并行 key 都写上，未启用的后端忽略对应项，互不干扰。
# DTensor 后端：
policy.dtensor_cfg.tensor_parallel_size=1
# Megatron 后端（本仓库 GRPO 默认，见 configs/base/grpo_megatron.yaml）：
policy.megatron_cfg.tensor_model_parallel_size=1
policy.megatron_cfg.pipeline_model_parallel_size=1
policy.megatron_cfg.context_parallel_size=1

# 说明：这里只放「所有实验（含 SFT）共有」的键。CLI override 是 struct 模式，
# 只能改已存在的键；SFT base 没有 policy.generation，故生成/显存类调优不放这里。
#
# ⚠️ 单卡关键约束：vLLM 生成必须 colocated（与 policy 共用这一张 H100，分时复用显存），
# 且 vLLM TP=1。二者都是 base 默认（configs/base/grpo_megatron.yaml），无需在此重复；
# 若某实验把 colocated 关掉或把 vLLM TP 调大，单卡会起不来，需在该实验里改回。
