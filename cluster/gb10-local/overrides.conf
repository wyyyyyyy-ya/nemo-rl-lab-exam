# 硬件 profile: 单机 1x DGX Spark GB10（统一内存 128GB）
# 本 profile 只用于直接在当前机器的 Docker 容器内训练。

cluster.num_nodes=1
cluster.gpus_per_node=1

# 单卡 colocated 训练：所有并行度均为 1。
policy.dtensor_cfg.tensor_parallel_size=1
policy.megatron_cfg.tensor_model_parallel_size=1
policy.megatron_cfg.pipeline_model_parallel_size=1
policy.megatron_cfg.context_parallel_size=1

# GB10 的统一内存仍需保守起跑；稳定后再逐步提高利用率和序列长度。
policy.megatron_cfg.activation_checkpointing=true
policy.megatron_cfg.empty_unused_memory_level=1
policy.generation.vllm_cfg.enforce_eager=true
policy.generation.vllm_cfg.gpu_memory_utilization=0.3
policy.train_micro_batch_size=1
policy.max_total_sequence_length=1024
